<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Comando Multi-Cámara</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #222; color: white; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .video-container {
            border: 5px solid #444;
            border-radius: 10px;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 20px;
            background-color: black;
            min-height: 240px;
        }
        img { width: 100%; max-width: 640px; display: block; }

        .control-panel { background: #333; padding: 20px; border-radius: 10px; }
        input[type=range] { width: 80%; accent-color: #00d2ff; cursor: pointer; }
        
        /* Estilo del Selector */
        select {
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 5px;
            margin-bottom: 20px;
            background-color: #444;
            color: white;
            border: 1px solid #00d2ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema de Vigilancia</h1>
        
        <select id="camSelector" onchange="cambiarCamara()">
            {% for id, info in cameras.items() %}
                <option value="{{ id }}">{{ info.name }}</option>
            {% endfor %}
        </select>

        <div class="video-container">
            <img id="videoStream" src="" alt="Cargando...">
        </div>

        <div class="control-panel">
            <label>Intensidad LED: <span id="valor">0</span></label>
            <input type="range" id="ledRange" min="0" max="255" value="0" 
                oninput="actualizarDisplay('valor', this.value)" 
                onchange="enviarBrillo(this.value)">
            
            <hr style="border-color: #555; margin: 20px 0;">

            <h3>Control de Movimiento</h3>
            
            <label>Pan: <span id="valPan">90</span>°</label>
            <input type="range" id="panRange" min="0" max="180" value="90" 
                oninput="actualizarDisplay('valPan', this.value)" 
                onchange="enviarServo()">

            <label>Tilt: <span id="valTilt">90</span>°</label>
            <input type="range" id="tiltRange" min="0" max="180" value="90" 
                oninput="actualizarDisplay('valTilt', this.value)" 
                onchange="enviarServo()">
        </div>
    </div>
    
    <script>
        let currentCamId = "";
        let isUpdatingUI = false; // Evita enviar comandos al cambiar de cámara

        function init() {
            const selector = document.getElementById('camSelector');
            currentCamId = selector.value;
            cambiarCamara();
        }

        function cambiarCamara() {
            const selector = document.getElementById('camSelector');
            currentCamId = selector.value;
            
            //Cambiar video
            const img = document.getElementById('videoStream');
            img.src = `/video_feed/${currentCamId}?t=` + new Date().getTime();
            
            //Pedir estado guardado al servidor
            fetch(`/get_state/${currentCamId}`)
                .then(response => response.json())
                .then(data => {
                    isUpdatingUI = true; // Bloqueamos el envío de datos
                    
                    document.getElementById('ledRange').value = data.led;
                    document.getElementById('valor').innerText = data.led;

                    document.getElementById('panRange').value = data.pan;
                    document.getElementById('valPan').innerText = data.pan;
                    
                    document.getElementById('tiltRange').value = data.tilt;
                    document.getElementById('valTilt').innerText = data.tilt;

                    isUpdatingUI = false; // Desbloqueamos
                })
                .catch(err => console.error("Error estado:", err));
        }

        function actualizarDisplay(id, valor) {
            document.getElementById(id).innerText = valor;
        }

        function enviarServo() {
            if (isUpdatingUI) return; 

            let pan = document.getElementById('panRange').value;
            let tilt = document.getElementById('tiltRange').value;

            fetch(`/move_servo/${currentCamId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pan: pan, tilt: tilt })
            }).catch(error => console.error('Error:', error));
        }

        function enviarBrillo(valor) {
            if (isUpdatingUI) return;

            fetch(`/led/${currentCamId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ intensity: valor })
            }).catch(error => console.error('Error:', error));
        }

        window.onload = init;
    </script>
</body>
</html>
